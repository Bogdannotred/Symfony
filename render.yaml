services:
  - type: web
    name: superior-tasks
    runtime: docker
    plan: free
    envVars:
      - key: APP_ENV
        value: prod
      - key: DATABASE_URL
        fromDatabase:
          name: task-db
          property: connectionString
      - key: APP_SECRET
        generateValue: true
    disk:
      name: var-cache
      mountPath: /app/var
      sizeGB: 1

databases:
  - name: task-db
    plan: free
    databaseName: task_manager
    user: task_user
